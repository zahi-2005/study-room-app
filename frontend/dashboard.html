<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Room - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-header">
            <h1>Study Rooms</h1>
            <div style="display:flex; gap:12px; align-items:center;">
                <span id="welcome-text" style="color:#888;"></span>
                <button class="btn-secondary" onclick="openCreateModal()">+ New Room</button>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="rooms-grid" class="rooms-grid">
            <p style="color:#888;">Loading rooms...</p>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>Create a Study Room</h2>
            <input type="text" id="room-name" placeholder="Room name (e.g. DSA Practice)" />
            <input type="text" id="room-topic" placeholder="Topic (e.g. Python, Math)" />
            <div class="modal-buttons">
                <button class="btn-primary" onclick="createRoom()">Create</button>
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
            <p id="modal-message" class="message"></p>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
